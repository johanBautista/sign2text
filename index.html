<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport optimizado para dispositivos móviles -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <!-- Meta información de la app -->
    <title>Sign2Text - Sign Language to Text Translator</title>
    <meta
      name="description"
      content="Real-time sign language to text translation app. Empowering communication accessibility for the deaf and hard of hearing community."
    />
    <meta
      name="keywords"
      content="sign language, translation, accessibility, deaf, ASL, communication"
    />

    <!-- PWA y mobile app meta tags -->
    <meta name="theme-color" content="#2D7A5F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sign2Text" />

    <!-- Carga de fuente Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
